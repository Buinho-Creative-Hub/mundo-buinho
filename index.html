<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#FAF0E1">
<meta name="description" content="Mundo Buinho — jogos de biofabricação para os 8 aos 10 anos. Buinho FabLab, Messejana.">
<title>Mundo Buinho</title>
<link rel="stylesheet" href="/static/css/mundo.css">
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" href="/static/icones/icone-192.png">
<link rel="apple-touch-icon" href="/static/icones/icone-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>
  <div class="app" id="app"></div>

  <noscript>
    <p style="padding:24px;font-family:sans-serif">
      O Mundo Buinho precisa de JavaScript para funcionar.
    </p>
  </noscript>

  <script src="/static/js/dados.js"></script>
  <script src="/static/js/dados-mat.js"></script>
  <script src="/static/js/dados-dominos.js"></script>
  <script src="/static/js/dados-memoria.js"></script>
  <script src="/static/js/nucleo.js"></script>
  <script src="/static/js/jogos.js"></script>
  <script>
    // Service worker: joga offline depois da primeira visita (escolas com rede fraca)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
